name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.result.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            version:
              - 'package.json'
      - id: result
        run: echo "version=${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.version }}" >> $GITHUB_OUTPUT

  bump:
    name: Bump
    needs: [changes]
    if: needs.changes.outputs.version == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "26"
          cache: true

      - run: vp dlx @varlock/bumpy ci plan
        env:
          GH_TOKEN: ${{ github.token }}

      - run: vp dlx @varlock/bumpy ci release
        env:
          GH_TOKEN: ${{ github.token }}
          BUMPY_GH_TOKEN: ${{ secrets.BUMPY_GH_TOKEN }}
          NO_COLOR: "1"
          YARN_ENABLE_COLORS: "false"

  pack:
    name: Pack (${{ matrix.runner }})
    needs: [changes]
    if: needs.changes.outputs.version == 'true'
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            targets: linux-x64,linux-arm64
          - runner: macos-latest
            targets: darwin-x64,darwin-arm64
          - runner: windows-latest
            targets: win-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "26"
          cache: true

      - run: vp pack
        env:
          CI: true
          PACK_TARGETS: ${{ matrix.targets }}

      - uses: actions/upload-artifact@v7
        with:
          name: executables-${{ matrix.runner }}
          path: build/plxm-*
          if-no-files-found: error

  publish:
    name: Publish
    needs: [changes, pack]
    if: needs.changes.outputs.version == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "26"
          cache: true

      - id: plan
        run: vp dlx @varlock/bumpy ci plan
        env:
          GH_TOKEN: ${{ github.token }}

      - run: vp dlx @varlock/bumpy ci release
        env:
          GH_TOKEN: ${{ github.token }}
          BUMPY_GH_TOKEN: ${{ secrets.BUMPY_GH_TOKEN }}
          NO_COLOR: "1"
          YARN_ENABLE_COLORS: "false"

      - uses: actions/download-artifact@v7
        if: steps.plan.outputs.mode == 'publish'
        with:
          pattern: executables-*
          path: build
          merge-multiple: true

      - name: Upload executables to GitHub release
        if: steps.plan.outputs.mode == 'publish'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="@saeris/plex-monitor@${VERSION}"
          gh release upload "${TAG}" build/plxm-* --clobber
        env:
          GH_TOKEN: ${{ github.token }}
