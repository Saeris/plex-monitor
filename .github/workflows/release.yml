name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # required for npm OIDC trusted publishing
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "26"
          cache: true

      - run: vp pack

      - id: plan
        run: vp dlx @varlock/bumpy ci plan
        env:
          GH_TOKEN: ${{ github.token }}

      - run: vp dlx @varlock/bumpy ci release
        env:
          GH_TOKEN: ${{ github.token }}
          BUMPY_GH_TOKEN: ${{ secrets.BUMPY_GH_TOKEN }}

      - name: Upload executables to GitHub release
        if: steps.plan.outputs.mode == 'publish'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="@saeris/plex-monitor@${VERSION}"
          gh release upload "${TAG}" build/plxm-* --clobber
        env:
          GH_TOKEN: ${{ github.token }}
