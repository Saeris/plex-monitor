name: Release

on:
  push:
    branches: [main]

jobs:
  pack:
    name: Pack (${{ matrix.runner }})
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            targets: linux-x64,linux-arm64
          - runner: macos-latest
            targets: darwin-x64,darwin-arm64
          - runner: windows-latest
            targets: win-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "26"
          cache: true

      - run: vp pack
        env:
          CI: true
          PACK_TARGETS: ${{ matrix.targets }}

      - uses: actions/upload-artifact@v7
        with:
          name: executables-${{ matrix.runner }}
          path: build/plxm-*
          if-no-files-found: error

  release:
    name: Publish
    needs: pack
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # required for npm OIDC trusted publishing
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "26"
          cache: true

      - id: plan
        run: vp dlx @varlock/bumpy ci plan
        env:
          GH_TOKEN: ${{ github.token }}

      - run: vp dlx @varlock/bumpy ci release
        env:
          GH_TOKEN: ${{ github.token }}
          BUMPY_GH_TOKEN: ${{ secrets.BUMPY_GH_TOKEN }}
          NO_COLOR: "1"
          FORCE_COLOR: "0"

      - uses: actions/download-artifact@v7
        if: steps.plan.outputs.mode == 'publish'
        with:
          pattern: executables-*
          path: build
          merge-multiple: true

      - name: Upload executables to GitHub release
        if: steps.plan.outputs.mode == 'publish'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="@saeris/plex-monitor@${VERSION}"
          gh release upload "${TAG}" build/plxm-* --clobber
        env:
          GH_TOKEN: ${{ github.token }}
